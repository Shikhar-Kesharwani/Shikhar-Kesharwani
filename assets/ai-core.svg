<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="1" />
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0" />
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="4" />
    </filter>
  </defs>

  <!-- Glowing background aura -->
  <circle cx="100" cy="100" r="60" fill="url(#glow)">
    <animate attributeName="r" values="45;65;45" dur="3s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="3s" repeatCount="indefinite" />
  </circle>

  <!-- Core central node -->
  <circle cx="100" cy="100" r="18" fill="#ffffff" filter="url(#blur)">
    <animate attributeName="r" values="16;22;16" dur="1.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="100" cy="100" r="12" fill="#ffffff" />

  <!-- Orbiting nodes -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="8s" repeatCount="indefinite" />
    <circle cx="100" cy="30" r="5" fill="#0ea5e9">
      <animate attributeName="r" values="4;7;4" dur="2s" repeatCount="indefinite" />
    </circle>
    <line x1="100" y1="35" x2="100" y2="85" stroke="#0ea5e9" stroke-width="1.5" stroke-dasharray="4" opacity="0.6" />
    
    <circle cx="100" cy="170" r="5" fill="#0ea5e9">
      <animate attributeName="r" values="4;7;4" dur="2.5s" repeatCount="indefinite" />
    </circle>
    <line x1="100" y1="165" x2="100" y2="115" stroke="#0ea5e9" stroke-width="1.5" stroke-dasharray="4" opacity="0.6" />
  </g>

  <!-- Second orbit layer -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="360 100 100" to="0 100 100" dur="12s" repeatCount="indefinite" />
    <circle cx="20" cy="100" r="6" fill="#f59e0b">
      <animate attributeName="r" values="4;8;4" dur="3s" repeatCount="indefinite" />
    </circle>
    <line x1="26" y1="100" x2="85" y2="100" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4" opacity="0.6" />

    <circle cx="180" cy="100" r="6" fill="#f59e0b">
      <animate attributeName="r" values="4;8;4" dur="2s" repeatCount="indefinite" />
    </circle>
    <line x1="174" y1="100" x2="115" y2="100" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4" opacity="0.6" />
  </g>
  
  <!-- Outer orbital ring -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#7c3aed" stroke-width="1" stroke-dasharray="10 15" opacity="0.3">
      <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="20s" repeatCount="indefinite" />
  </circle>
</svg>
